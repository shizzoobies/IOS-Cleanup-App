name = "swipeclean-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Bind two KV namespaces: one for response caching, one for rate limiting.
# Create them with: wrangler kv:namespace create CACHE
#                  wrangler kv:namespace create RATE_LIMITS
[[kv_namespaces]]
binding = "CACHE"
id = "9035c16bd757468fb42bf57d39ad41b7"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "702cc9cbf55c44a68b101dd5848757a6"

# Anthropic API key. Set via: wrangler secret put ANTHROPIC_API_KEY
# Do not commit secrets.

[vars]
ENVIRONMENT = "development"
HAIKU_MODEL = "claude-haiku-4-5"
SONNET_MODEL = "claude-sonnet-4-6"
